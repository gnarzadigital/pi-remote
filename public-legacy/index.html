<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>pi remote</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
</head>
<body class="view-sessions">

  <!-- Mobile home: full-screen session list -->
  <section id="sessions-view" aria-label="Sessions">
    <header id="sessions-header">
      <div id="sessions-header-row">
        <h1 id="sessions-title">Sessions</h1>
        <button id="mobile-new-session-btn" class="btn-pill" type="button">New</button>
      </div>
      <div id="sessions-connection" class="connection-pill">
        <span id="sessions-status-dot" class="dot idle"></span>
        <span id="sessions-status-text">Connecting…</span>
      </div>
    </header>
    <div id="sessions-list-scroll">
      <div id="mobile-session-list" class="session-group"></div>
    </div>
  </section>

  <!-- Chat shell -->
  <div id="chat-shell">
  <header id="header">
    <button id="back-to-sessions" class="mobile-nav-btn" type="button" aria-label="Back to sessions">‹ Sessions</button>
    <div id="header-left">
      <span id="status-dot" class="dot idle"></span>
      <span id="status-text">connecting…</span>
      <div id="session-dropdown">
        <button id="session-btn" class="icon-only-btn" title="Sessions" aria-label="Sessions"><svg class="action-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M232,192a8,8,0,0,1-8,8H160.94a15.92,15.92,0,0,1-14.31-8.84L95.06,88H32a8,8,0,0,1,0-16H95.06a15.92,15.92,0,0,1,14.31,8.84L160.94,184H224A8,8,0,0,1,232,192ZM152,88h72a8,8,0,0,0,0-16H152a8,8,0,0,0,0,16Z"/></svg></button>
        <div id="session-panel" class="hidden">
          <div id="session-panel-header">
            <span>Sessions</span>
            <button id="new-session-btn" class="btn-small">+ New</button>
          </div>
          <div id="session-list"></div>
        </div>
      </div>
    </div>
    <div id="header-center">
      <span id="chat-session-title" class="mobile-only"></span>
      <div id="model-dropdown">
        <button id="model-btn" title="Switch model" disabled>pi remote</button>
        <div id="model-panel" class="hidden">
          <div id="model-list"></div>
        </div>
      </div>
    </div>
    <div id="header-right">
      <span id="session-info"></span>
      <span id="session-stats"></span>
      <!-- Desktop: individual action buttons -->
      <button id="fork-btn" class="header-action-btn icon-only-btn" title="Fork conversation" aria-label="Fork conversation"><svg class="action-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M229.66,189.66l-32,32a8,8,0,0,1-11.32,0l-32-32a8,8,0,0,1,11.32-11.32L184,196.69V139.31l-56-56-56,56v57.38l18.34-18.35a8,8,0,0,1,11.32,11.32l-32,32a8,8,0,0,1-11.32,0l-32-32a8,8,0,0,1,11.32-11.32L56,196.69V136a8,8,0,0,1,2.34-5.66L120,68.69V24a8,8,0,0,1,16,0V68.69l61.66,61.65A8,8,0,0,1,200,136v60.69l18.34-18.35a8,8,0,0,1,11.32,11.32Z"/></svg></button>
      <button id="export-btn" class="header-action-btn icon-only-btn" title="Export conversation" aria-label="Export conversation"><svg class="action-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M216,112v96a16,16,0,0,1-16,16H56a16,16,0,0,1-16-16V112A16,16,0,0,1,56,96H80a8,8,0,0,1,0,16H56v96H200V112H176a8,8,0,0,1,0-16h24A16,16,0,0,1,216,112ZM93.66,69.66,120,43.31V136a8,8,0,0,0,16,0V43.31l26.34,26.35a8,8,0,0,0,11.32-11.32l-40-40a8,8,0,0,0-11.32,0l-40,40A8,8,0,0,0,93.66,69.66Z"/></svg></button>
      <button id="compact-btn" class="header-action-btn icon-only-btn" title="Compact context" aria-label="Compact context"><svg class="action-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M223.68,66.15,135.68,18a15.88,15.88,0,0,0-15.36,0l-88,48.17a16,16,0,0,0-8.32,14v95.64a16,16,0,0,0,8.32,14l88,48.17a15.88,15.88,0,0,0,15.36,0l88-48.17a16,16,0,0,0,8.32-14V80.18A16,16,0,0,0,223.68,66.15ZM128,32l80.34,44-29.77,16.3-80.35-44ZM128,120,47.66,76l33.9-18.56,80.34,44ZM40,90l80,43.78v85.79L40,175.82Zm176,85.78h0l-80,43.79V133.82l32-17.51V152a8,8,0,0,0,16,0V107.55L216,90v85.77Z"/></svg></button>
      <button id="notifications-btn" class="header-action-btn icon-only-btn" title="Enable done notifications" aria-label="Enable done notifications"></button>
      <!-- Mobile: overflow menu (sessions + above 3) -->
      <div id="overflow-menu">
        <button id="overflow-btn" title="More actions">⋯</button>
        <div id="overflow-panel" class="hidden">
          <button id="overflow-sessions" class="icon-only-menu-btn" aria-label="Sessions" title="Sessions"><svg class="action-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M232,192a8,8,0,0,1-8,8H160.94a15.92,15.92,0,0,1-14.31-8.84L95.06,88H32a8,8,0,0,1,0-16H95.06a15.92,15.92,0,0,1,14.31,8.84L160.94,184H224A8,8,0,0,1,232,192ZM152,88h72a8,8,0,0,0,0-16H152a8,8,0,0,0,0,16Z"/></svg></button>
          <button id="overflow-fork" class="icon-only-menu-btn" aria-label="Fork conversation" title="Fork conversation"><svg class="action-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M229.66,189.66l-32,32a8,8,0,0,1-11.32,0l-32-32a8,8,0,0,1,11.32-11.32L184,196.69V139.31l-56-56-56,56v57.38l18.34-18.35a8,8,0,0,1,11.32,11.32l-32,32a8,8,0,0,1-11.32,0l-32-32a8,8,0,0,1,11.32-11.32L56,196.69V136a8,8,0,0,1,2.34-5.66L120,68.69V24a8,8,0,0,1,16,0V68.69l61.66,61.65A8,8,0,0,1,200,136v60.69l18.34-18.35a8,8,0,0,1,11.32,11.32Z"/></svg></button>
          <button id="overflow-export" class="icon-only-menu-btn" aria-label="Export conversation" title="Export conversation"><svg class="action-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M216,112v96a16,16,0,0,1-16,16H56a16,16,0,0,1-16-16V112A16,16,0,0,1,56,96H80a8,8,0,0,1,0,16H56v96H200V112H176a8,8,0,0,1,0-16h24A16,16,0,0,1,216,112ZM93.66,69.66,120,43.31V136a8,8,0,0,0,16,0V43.31l26.34,26.35a8,8,0,0,0,11.32-11.32l-40-40a8,8,0,0,0-11.32,0l-40,40A8,8,0,0,0,93.66,69.66Z"/></svg></button>
          <button id="overflow-compact" class="icon-only-menu-btn" aria-label="Compact context" title="Compact context"><svg class="action-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M223.68,66.15,135.68,18a15.88,15.88,0,0,0-15.36,0l-88,48.17a16,16,0,0,0-8.32,14v95.64a16,16,0,0,0,8.32,14l88,48.17a15.88,15.88,0,0,0,15.36,0l88-48.17a16,16,0,0,0,8.32-14V80.18A16,16,0,0,0,223.68,66.15ZM128,32l80.34,44-29.77,16.3-80.35-44ZM128,120,47.66,76l33.9-18.56,80.34,44ZM40,90l80,43.78v85.79L40,175.82Zm176,85.78h0l-80,43.79V133.82l32-17.51V152a8,8,0,0,0,16,0V107.55L216,90v85.77Z"/></svg></button>
          <button id="overflow-notifications" class="icon-only-menu-btn" aria-label="Toggle notifications"></button>
        </div>
      </div>
      <button id="abort-btn" class="icon-only-btn" title="Abort" aria-label="Abort" disabled><svg class="action-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216ZM160,88H96a8,8,0,0,0-8,8v64a8,8,0,0,0,8,8h64a8,8,0,0,0,8-8V96A8,8,0,0,0,160,88Zm-8,64H104V104h48Z"/></svg></button>
    </div>
  </header>

  <div id="status-strip" aria-live="polite">
    <span id="status-strip-dot" class="dot idle"></span>
    <span id="status-strip-text">Connecting…</span>
  </div>

  <!-- Conversation -->
  <main id="conversation"></main>

  <!-- File reference autocomplete (shown near input) -->
  <div id="file-autocomplete"></div>

  <!-- Slash command picker (shown above input) -->
  <div id="cmd-picker" class="hidden">
    <div id="cmd-list"></div>
  </div>

  <!-- Extension UI dialog overlay -->
  <div id="dialog-overlay" class="hidden">
    <div id="dialog-box">
      <h3 id="dialog-title"></h3>
      <p id="dialog-message" class="hidden"></p>
      <!-- select options rendered here -->
      <div id="dialog-options" class="hidden"></div>
      <!-- input -->
      <input id="dialog-input" type="text" class="hidden" autocorrect="off" autocapitalize="off" />
      <!-- editor -->
      <textarea id="dialog-editor" class="hidden" rows="6"></textarea>
      <div id="dialog-buttons">
        <button id="dialog-cancel" class="btn-secondary">Cancel</button>
        <button id="dialog-confirm" class="btn-primary hidden">OK</button>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <footer id="input-area">
    <div id="image-tray" class="hidden"></div>
    <div id="input-row">
      <button id="attach-btn" class="icon-only-btn" title="Attach image" aria-label="Attach image"><svg class="action-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M209.66,122.34a8,8,0,0,1,0,11.32l-82.05,82a56,56,0,0,1-79.2-79.21L147.67,35.73a40,40,0,1,1,56.61,56.55L105,193A24,24,0,1,1,71,159L154.3,74.38A8,8,0,1,1,165.7,85.6L82.39,170.31a8,8,0,1,0,11.27,11.36L192.93,81A24,24,0,1,0,159,47L59.76,147.68a40,40,0,1,0,56.53,56.62l82.06-82A8,8,0,0,1,209.66,122.34Z"/></svg></button>
      <input id="attach-input" type="file" accept="image/*" multiple style="display:none" />
      <textarea
        id="msg-input"
        placeholder="Send a message…"
        rows="1"
        autocorrect="off"
        autocapitalize="sentences"
        spellcheck="true"
      ></textarea>
      <button id="send-btn" class="btn-primary icon-only-btn" title="Send" aria-label="Send" disabled><svg class="action-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M231.87,114l-168-95.89A16,16,0,0,0,40.92,37.34L71.55,128,40.92,218.67A16,16,0,0,0,56,240a16.15,16.15,0,0,0,7.93-2.1l167.92-96.05a16,16,0,0,0,.05-27.89ZM56,224a.56.56,0,0,0,0-.12L85.74,136H144a8,8,0,0,0,0-16H85.74L56.06,32.16A.46.46,0,0,0,56,32l168,95.83Z"/></svg></button>
    </div>
    <div id="mode-row">
      <!-- Desktop: segmented mode selector -->
      <div id="mode-segmented">
        <button class="mode-btn active" data-mode="prompt">Prompt</button>
        <button class="mode-btn" data-mode="steer">Steer</button>
        <button class="mode-btn" data-mode="follow_up">Follow-up</button>
      </div>
      <!-- Mobile: single cycling mode button -->
      <button id="mode-cycle">Prompt</button>

      <div id="thinking-control" title="Thinking level">
        <span class="thinking-label" aria-hidden="true"><svg class="action-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M248,124a56.11,56.11,0,0,0-32-50.61V72a48,48,0,0,0-88-26.49A48,48,0,0,0,40,72v1.39a56,56,0,0,0,0,101.2V176a48,48,0,0,0,88,26.49A48,48,0,0,0,216,176v-1.41A56.09,56.09,0,0,0,248,124ZM88,208a32,32,0,0,1-31.81-28.56A55.87,55.87,0,0,0,64,180h8a8,8,0,0,0,0-16H64A40,40,0,0,1,50.67,86.27,8,8,0,0,0,56,78.73V72a32,32,0,0,1,64,0v68.26A47.8,47.8,0,0,0,88,128a8,8,0,0,0,0,16,32,32,0,0,1,0,64Zm104-44h-8a8,8,0,0,0,0,16h8a55.87,55.87,0,0,0,7.81-.56A32,32,0,1,1,168,144a8,8,0,0,0,0-16,47.8,47.8,0,0,0-32,12.26V72a32,32,0,0,1,64,0v6.73a8,8,0,0,0,5.33,7.54A40,40,0,0,1,192,164Zm16-52a8,8,0,0,1-8,8h-4a36,36,0,0,1-36-36V80a8,8,0,0,1,16,0v4a20,20,0,0,0,20,20h4A8,8,0,0,1,208,112ZM60,120H56a8,8,0,0,1,0-16h4A20,20,0,0,0,80,84V80a8,8,0,0,1,16,0v4A36,36,0,0,1,60,120Z"/></svg></span>
        <!-- Desktop: segmented thinking selector -->
        <div id="thinking-segmented">
          <button class="thinking-btn active" data-level="none" title="No thinking">Off</button>
          <button class="thinking-btn" data-level="low" title="Low thinking">Low</button>
          <button class="thinking-btn" data-level="high" title="High thinking">High</button>
        </div>
        <!-- Mobile: single cycling thinking button -->
        <button id="thinking-cycle">Off</button>
      </div>
    </div>
  </footer>
  </div><!-- /chat-shell -->

  <script src="client.js"></script>
  <script>
    // Register service worker for PWA/offline behavior.
    // Note: this alone does not enable lock-screen push notifications;
    // push still requires server-side Web Push plumbing.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
