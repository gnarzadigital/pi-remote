<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Reference-diffed against Hermes WebUI (~/.hermes/hermes-agent/web/index.html),
         which has ZERO app-install metadata — no manifest link, no
         apple-mobile-web-app-capable. Hermes is never launched in Apple's
         "installed standalone app" WKWebView container; it's a bookmarked page
         rendered by plain Mobile Safari. That container is the root cause of
         every iOS-only bug hit here (position:fixed breaking after a viewport
         recalc, 100dvh mismeasuring, window.innerHeight != window.screen.height)
         — all are documented quirks specific to Apple's standalone display mode,
         not bugs in this app's CSS. Removing apple-mobile-web-app-capable stops
         "Add to Home Screen" from entering that mode at all, matching Hermes
         exactly. Trade-off: the icon opens plain Safari (address bar + Safari's
         own auto-hiding toolbar) instead of a borderless full-screen look — the
         same trade Hermes already makes, which is why Hermes has never hit any
         of these bugs. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <script>
      (function () {
        var d = document.documentElement;
        d.style.setProperty("--vv-offset-top", "0px");
        d.style.setProperty("--vv-offset-bottom", "0px");
        var raw = localStorage.getItem("pi-remote-text-scale");
        var scale = raw ? parseFloat(raw) : 1;
        if (!isNaN(scale) && scale >= 0.85 && scale <= 1.35) {
          var s = document.createElement("style");
          s.id = "session-list-text-scale-boot";
          s.textContent =
            ".session-cursor-list,.session-list-preview{--session-list-text-scale:" + scale + "}";
          document.head.appendChild(s);
        }
      })();
    </script>

    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
